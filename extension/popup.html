<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Phishing Detector</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      font-size: 13px;
      color: #222;
    }
    h1 { margin: 0 0 8px; font-size: 15px; }
    .status { padding: 8px; border-radius: 6px; margin: 8px 0; }
    .status.ok    { background: #e6f4ea; color: #137333; }
    .status.fail  { background: #fce8e6; color: #c5221f; }
    .row { display: flex; justify-content: space-between; margin: 6px 0; }
    .row .label { color: #666; }
    button {
      width: 100%; padding: 8px; margin-top: 8px;
      background: #1a73e8; color: #fff; border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px;
    }
    button:hover { background: #1765cc; }
    a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🛡 Phishing Detector</h1>

  <div id="status" class="status">檢查後端連線中…</div>

  <div class="row"><span class="label">端點</span><span id="endpoint">—</span></div>
  <div class="row"><span class="label">引擎</span><span id="engine">mock-keyword-v1</span></div>

  <button id="ping">重新測試連線</button>
  <button id="open-options" style="background:#5f6368;">⚙ 設定</button>

  <script src="popup.js"></script>
</body>
</html>
